name: Build (reusable)

# Reusable workflow that does the heavy lifting: install xcodegen, generate
# project, build, optionally sign with Developer ID and notarize, then
# package into DMG + ZIP. Both `build.yml` (PR validation) and `release.yml`
# (tagged releases) call this with different inputs.

on:
  workflow_call:
    inputs:
      upload-artifacts:
        description: 'Upload DMG/ZIP as workflow artifacts'
        required: false
        default: false
        type: boolean
      release:
        description: 'Full release flow — sign with Developer ID and notarize'
        required: false
        default: false
        type: boolean
    secrets:
      APPLE_CERTIFICATE:
        required: false
      APPLE_CERTIFICATE_PASSWORD:
        required: false
      APPLE_ID:
        required: false
      APPLE_APP_SPECIFIC_PASSWORD:
        required: false
      APPLE_TEAM_ID:
        required: false
      SPARKLE_PRIVATE_KEY:
        required: false

env:
  # Pin the Sparkle release whose CLI tools (generate_appcast) we download.
  SPARKLE_VERSION: "2.6.4"

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so make_release.sh can derive a monotonic build
          # number from `git rev-list --count HEAD` (Sparkle needs an
          # increasing CFBundleVersion).
          fetch-depth: 0

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate
          # xcodegen writes objectVersion=77 which only Xcode 26+ can read.
          # Force it down to 70 (Xcode 15+ compatible) so any modern runner
          # Xcode can open the project.
          sed -i '' 's/objectVersion = 77;/objectVersion = 70;/' CineScreen.xcodeproj/project.pbxproj
          grep -m1 "objectVersion" CineScreen.xcodeproj/project.pbxproj

      - name: Build (Debug, no signing)
        if: '!inputs.release'
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild \
            -project CineScreen.xcodeproj \
            -scheme CineScreen \
            -configuration Debug \
            -derivedDataPath build/derived \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            build | tee build/build.log

      # ----- Code signing setup (release only) ------------------------------
      - name: Import signing certificate
        if: inputs.release
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "Missing APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD secrets"
            exit 1
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/cinescreen-build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Apple's intermediate CAs (so the chain is complete inside this temp keychain)
          curl -sLO https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          curl -sLO https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          security import DeveloperIDG2CA.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security import AppleWWDRCAG3.cer  -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          rm -f DeveloperIDG2CA.cer AppleWWDRCAG3.cer

          # Developer ID Application cert (.p12 → base64 → decoded into temp file)
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          rm -f "$CERT_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/[\" ]//g')

          # Surface to later steps
          echo "KEYCHAIN_NAME=$KEYCHAIN_PATH"             >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD"     >> "$GITHUB_ENV"

          echo "==> Identities visible in temp keychain:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      # ----- Sparkle appcast tooling (release only) -------------------------
      - name: Set up Sparkle tools
        if: inputs.release
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "SPARKLE_PRIVATE_KEY secret not set — appcast will be skipped." >&2
            exit 0
          fi
          # Download the matching Sparkle release just for its CLI tools.
          TARBALL="Sparkle-$SPARKLE_VERSION.tar.xz"
          curl -sLO "https://github.com/sparkle-project/Sparkle/releases/download/$SPARKLE_VERSION/$TARBALL"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xf "$TARBALL" -C "$RUNNER_TEMP/sparkle"
          echo "SPARKLE_BIN=$RUNNER_TEMP/sparkle/bin" >> "$GITHUB_ENV"

          # Materialize the EdDSA private key into a file for generate_appcast.
          KEY_FILE="$RUNNER_TEMP/sparkle_ed_private_key"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          echo "SPARKLE_PRIVATE_KEY_FILE=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Build, sign, notarize, package
        if: inputs.release
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # KEYCHAIN_NAME / KEYCHAIN_PASSWORD already exported by previous step
          # SPARKLE_BIN / SPARKLE_PRIVATE_KEY_FILE exported by the step above
          # Enclosure URLs in the appcast point at this tag's release assets.
          SPARKLE_DOWNLOAD_URL_PREFIX: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          DEVELOPER_ID_APPLICATION=$(security find-identity -v -p codesigning "$KEYCHAIN_NAME" \
            | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$DEVELOPER_ID_APPLICATION" ]; then
            echo "Could not find 'Developer ID Application' identity in keychain" >&2
            exit 1
          fi
          echo "Signing with: $DEVELOPER_ID_APPLICATION"
          export DEVELOPER_ID_APPLICATION
          bash scripts/make_release.sh

      - name: Upload artifacts
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CineScreen-macOS
          path: |
            release/*.dmg
            release/*.zip
            release/appcast.xml
          if-no-files-found: ignore
